<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lewitt Lines — 24 Circles (3)</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #f6f7f9; color: #111; }
    svg { background: #fff; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  </style>
  </head>
<body>
  <svg id="s" width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" aria-label="24 circles with straight and wavy connections"></svg>
  <script>
    const svg = document.getElementById('s');
    const W = svg.viewBox.baseVal.width;
    const H = svg.viewBox.baseVal.height;

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function generateGridJitteredPoints(cols, rows, margin = 24) {
      const pts = [];
      const cw = (W - margin * 2) / cols;
      const ch = (H - margin * 2) / rows;
      const r = 4;
      for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
          const x0 = margin + i * cw;
          const y0 = margin + j * ch;
          const x1 = x0 + cw;
          const y1 = y0 + ch;
          const pad = Math.min(cw, ch) * 0.15;
          pts.push({ x: rand(x0 + pad, x1 - pad), y: rand(y0 + pad, y1 - pad) });
        }
      }
      return { pts, r };
    }

    function dist(a, b) { const dx = a.x - b.x, dy = a.y - b.y; return Math.hypot(dx, dy); }

    function greedyNearestPairs(points) {
      const remaining = points.map((p, idx) => ({ ...p, idx }));
      const pairs = [];
      while (remaining.length > 1) {
        // Take the first, pair with its nearest neighbor
        const a = remaining.shift();
        let bestK = 0, bestD = Infinity;
        for (let k = 0; k < remaining.length; k++) {
          const d = dist(a, remaining[k]);
          if (d < bestD) { bestD = d; bestK = k; }
        }
        const b = remaining.splice(bestK, 1)[0];
        pairs.push([a, b]);
      }
      return pairs;
    }

    function el(name, attrs) {
      const e = document.createElementNS('http://www.w3.org/2000/svg', name);
      for (const k in attrs) e.setAttribute(k, attrs[k]);
      return e;
    }

    function drawStraight(a, b) {
      const line = el('line', {
        x1: a.x, y1: a.y, x2: b.x, y2: b.y,
        stroke: '#111', 'stroke-width': 1.25, 'stroke-linecap': 'round'
      });
      svg.appendChild(line);
    }

    function drawWavy(a, b, amp = 8, cycles = 3, steps = 80) {
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len; // along
      const px = -uy, py = ux;            // perpendicular
      let d = '';
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const baseX = a.x + ux * len * t;
        const baseY = a.y + uy * len * t;
        const offset = Math.sin(t * Math.PI * 2 * cycles) * amp;
        const x = baseX + px * offset;
        const y = baseY + py * offset;
        d += (i === 0 ? 'M ' : ' L ') + x.toFixed(2) + ' ' + y.toFixed(2);
      }
      const path = el('path', { d, fill: 'none', stroke: '#0a67a3', 'stroke-width': 1.25, 'stroke-linecap': 'round' });
      svg.appendChild(path);
    }

    function drawCircles(points, r) {
      for (const p of points) {
        const c = el('circle', { cx: p.x, cy: p.y, r, fill: '#fff', stroke: '#111', 'stroke-width': 1 });
        svg.appendChild(c);
      }
    }

    function draw() {
      // Clear SVG
      while (svg.lastChild) svg.removeChild(svg.lastChild);

      // 24 points from a 6x4 jittered grid
      const { pts, r } = generateGridJitteredPoints(6, 4, 24);

      // Greedy nearest-neighbor pairing produces local connections
      const pairs = greedyNearestPairs(pts);

      // Alternate between straight and wavy to ensure 12 each
      pairs.forEach((pair, i) => {
        const [a, b] = pair;
        if (i % 2 === 0) drawStraight(a, b); else drawWavy(a, b);
      });

      // Draw circles on top
      drawCircles(pts, r);
    }

    draw();
  </script>
</body>
</html>
