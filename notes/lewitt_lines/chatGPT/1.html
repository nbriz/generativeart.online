<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Circles and Lines</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: white;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <canvas id="art" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById('art')
    const ctx = canvas.getContext('2d')
    const width = canvas.width
    const height = canvas.height
    const circles = []
    const radius = 4
    const padding = 24

    function randomPoint () {
      return {
        x: padding + Math.random() * (width - padding * 2),
        y: padding + Math.random() * (height - padding * 2)
      }
    }

    function drawCircle (point) {
      ctx.beginPath()
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2)
      ctx.fill()
    }

    function drawStraightLine (a, b) {
      ctx.beginPath()
      ctx.moveTo(a.x, a.y)
      ctx.lineTo(b.x, b.y)
      ctx.stroke()
    }

    function drawWavyLine (a, b) {
      const dx = b.x - a.x
      const dy = b.y - a.y
      const distance = Math.hypot(dx, dy)
      const angle = Math.atan2(dy, dx)
      const amplitude = 6
      const wavelength = 18
      const steps = Math.max(24, Math.floor(distance / 4))

      ctx.beginPath()

      for (let i = 0; i <= steps; i++) {
        const t = i / steps
        const baseX = a.x + dx * t
        const baseY = a.y + dy * t
        const offset = Math.sin((distance * t / wavelength) * Math.PI * 2) * amplitude
        const waveX = baseX + Math.cos(angle + Math.PI / 2) * offset
        const waveY = baseY + Math.sin(angle + Math.PI / 2) * offset

        if (i === 0) {
          ctx.moveTo(waveX, waveY)
        } else {
          ctx.lineTo(waveX, waveY)
        }
      }

      ctx.stroke()
    }

    function init () {
      for (let i = 0; i < 24; i++) {
        circles.push(randomPoint())
      }

      ctx.lineWidth = 1.5
      ctx.strokeStyle = '#222'
      ctx.fillStyle = '#222'

      for (let i = 0; i < 12; i++) {
        drawStraightLine(circles[i * 2], circles[i * 2 + 1])
      }

      for (let i = 0; i < 12; i++) {
        drawWavyLine(circles[i * 2], circles[(i * 2 + 5) % 24])
      }

      circles.forEach(drawCircle)
    }

    init()
  </script>
</body>
</html>
