<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lewitt Lines — Gallery</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --text: #222;
        --muted: #666;
        --shadow: 0 6px 18px rgba(0,0,0,0.12);
        --radius: 10px;
        --gap: 22px;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        padding: 32px 28px 48px;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      }
      header {
        max-width: none;
        margin: 0 0 20px;
        display: flex;
        justify-content: space-between;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      .note { color: var(--muted); font-size: 14px; }

      .grid {
        max-width: none;
        width: 100%;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--gap);
        align-items: start;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .thumb {
        display: block; /* ensure anchors behave like blocks */
        position: relative;
        width: 100%;
        /* 4:3 aspect ratio */
        padding-top: 66.6667%;
        background: #fff;
      }
      .thumb > img,
      .thumb > iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .thumb.image > img { object-fit: cover; }
      .thumb.iframe { background: #fafafa; overflow: hidden; --scale: 1; }
      .thumb.iframe iframe {
        transform: scale(var(--scale));
        transform-origin: 0 0;
        width: calc(100% / var(--scale));
        height: calc(100% / var(--scale));
      }

      /* overlay to capture clicks and refresh iframes */
      .refresh-overlay {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: transparent;
        cursor: pointer;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid #eee;
        font-size: 13px;
        color: var(--muted);
      }
      .meta a { color: inherit; text-decoration: none; }
      .meta a:hover { text-decoration: underline; }

      /* Make it a bit tighter on small screens */
      @media (max-width: 820px) {
        body { padding: 20px; }
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 520px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AI generated Sol Lewitt</h1>
      <p>
        <b>prompt:</b><br>
        Draw 24 tiny circles anywhere on a piece of paper.<br>
        Connect 12 of the circles with straight lines.<br>
        Connect 12 of the circles with wavy lines.
      </p>
    </header>

    <main id="grid" class="grid"></main>
    <script>
      // List all items we found in subfolders.
      const items = [
        // DALL-E images
        { type: 'image', path: 'DALL-E/2128c36e-45c0-4d43-8eca-4c424b20837c.png' },
        { type: 'image', path: 'DALL-E/23a24fd5-69c1-45ce-be3b-83e2df2bcac8.png' },
        { type: 'image', path: 'DALL-E/cf869bf1-b4e9-46bb-8fd0-6411fdc997ad.png' },
        // Grok image
        { type: 'image', path: 'Grok/image.jpg' },
        // chatGPT HTML
        { type: 'html', path: 'chatGPT/1.html' },
        // claude-code HTMLs
        { type: 'html', path: 'claude-code/1.html' },
        { type: 'html', path: 'claude-code/2.html' },
        // codex HTMLs
        { type: 'html', path: 'codex/1.html' },
        { type: 'html', path: 'codex/2.html' },
        { type: 'html', path: 'codex/3.html' },
        // nano-banana images
        { type: 'image', path: 'nano-banana/1.jpg' },
        { type: 'image', path: 'nano-banana/2.jpg' },
        { type: 'image', path: 'nano-banana/3.jpg' },
      ];

      const grid = document.getElementById('grid');

      function fileLabel(p) {
        return p.split('/')[0];
      }

      function cardWrapper() {
        const card = document.createElement('div');
        card.className = 'card';
        return card;
      }

      function imageCard(path) {
        const card = cardWrapper();
        const a = document.createElement('a');
        a.className = 'thumb image';
        a.href = path; a.target = '_blank'; a.rel = 'noopener';
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = path; img.alt = fileLabel(path);
        a.appendChild(img);
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<span>${fileLabel(path)}</span>`;
        card.append(a, meta);
        return card;
      }

      function htmlCard(path) {
        const card = cardWrapper();
        const wrap = document.createElement('div');
        wrap.className = 'thumb iframe';
        const iframe = document.createElement('iframe');
        iframe.loading = 'lazy';
        iframe.src = path;
        iframe.setAttribute('scrolling','no');
        const overlay = document.createElement('div');
        overlay.className = 'refresh-overlay';
        overlay.title = 'Click to refresh';
        wrap.append(iframe, overlay);
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<span>${fileLabel(path)}</span>`;
        card.append(wrap, meta);
        // Try to auto-scale content to fit the frame when same-origin
        iframe.addEventListener('load', () => {
          try {
            const doc = iframe.contentDocument;
            if (!doc) return;
            const el = doc.documentElement;
            const contentWidth = Math.max(el.scrollWidth, el.clientWidth);
            const contentHeight = Math.max(el.scrollHeight, el.clientHeight);
            const frameWidth = wrap.clientWidth;
            const frameHeight = wrap.clientHeight;
            const scale = Math.max(0.1, Math.min(frameWidth / contentWidth, frameHeight / contentHeight));
            wrap.style.setProperty('--scale', String(scale));
            // Remove internal scrollbars if possible
            doc.body && (doc.body.style.overflow = 'hidden');
            el.style.overflow = 'hidden';
            el.style.margin = '0';
          } catch (err) {
            // If cross-origin, we can't measure; fall back to a gentle scale
            wrap.style.setProperty('--scale', '0.8');
          }
        });
        return card;
      }

      for (const it of items) {
        grid.appendChild(it.type === 'image' ? imageCard(it.path) : htmlCard(it.path));
      }

      // Clicking the overlay reloads the underlying iframe
      document.addEventListener('click', (e) => {
        const overlay = e.target.closest('.refresh-overlay');
        if (!overlay) return;
        const iframe = overlay.parentElement.querySelector('iframe');
        if (iframe) {
          const src = iframe.getAttribute('src');
          iframe.setAttribute('src', src);
        }
      });
    </script>
  </body>
  </html>
